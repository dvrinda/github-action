name: Daily Commit

# Define when the workflow will run (schedule it daily)
on:
  schedule:
    - cron: '0 0 * * *'  # This is the cron syntax for running once per day at midnight

jobs:
  daily_commit:
    runs-on: ubuntu-latest  # The environment in which this will run (a fresh Ubuntu setup)

    steps:
      - name: Check out repository
        uses: actions/checkout@v3  # This action checks out the repo to make changes

      - name: Add a commit with my email
        run: |
          # Add a simple change to a file (e.g., add a date log)
          echo "Update: $(date)" >> daily-update.txt
          
          # Stage and commit the change
          git config --global user.email "21f1001205@ds.study.iitm.ac.in"
          git config --global user.name "DevSync Automation"
          git add daily-update.txt
          git commit -m "Daily commit update by 21f1001205@ds.study.iitm.ac.in"
          git push
